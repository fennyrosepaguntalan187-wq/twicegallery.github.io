<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
            
            /* Background Settings */
            background-color: #000000;
            background-image: url('logo.jpg');
            background-size: 60%;
            background-position: center center;
            background-repeat: no-repeat;
        }

        /* --- GLOWING TEXT STYLE --- */
        .title {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 3px;
            
            /* White Glow Effect */
            text-shadow: 
                0 0 10px #ffffff, 
                0 0 20px #ffffff, 
                0 0 30px #ffffff, 
                0 0 40px #ffffff;
        }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 600px; /* Original size for PC */
            z-index: 10;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            cursor: pointer;
            aspect-ratio: 1 / 1;
            width: 100%;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        /* ===================================== */
        /* ===     CHARACTERS STYLING      === */
        /* ===================================== */

        .character-column {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            display: flex !important; /* FORCE SHOW */
            flex-direction: column;
            z-index: 5;
        }

        .left {
            left: 330px; /* Original position for PC */
            gap: 35px;
        }

        .right {
            right: 330px; /* Original position for PC */
            gap: 65px;
        }

        .character-wrapper {
            position: relative;
            width: 130px; /* Original size for PC */
            height: 90px; /* Original size for PC */
            display: flex;
            justify-content: center;
            align-items: center;
            
            animation: float 3s ease-in-out infinite;
        }

        .character-wrapper:nth-child(1) { animation-delay: 0s; }
        .character-wrapper:nth-child(2) { animation-delay: 0.5s; }
        .character-wrapper:nth-child(3) { animation-delay: 1s; }
        .character-wrapper:nth-child(4) { animation-delay: 1.5s; }
        .character-wrapper:nth-child(5) { animation-delay: 2s; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        .character-img {
            width: 100%;
            height: auto;
            transition: opacity 0.3s ease;
        }

        .name-text {
            position: absolute;
            font-size: 16px; /* Original size for PC */
            font-weight: bold;
            color: white;
            text-shadow: 
                0 0 10px #ffffff, 
                0 0 20px #ffffff;
            opacity: 0;
            transition: opacity 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .character-wrapper:hover .character-img {
            opacity: 0;
        }

        .character-wrapper:hover .name-text {
            opacity: 1;
        }

        /* ===================================== */

        /* Video Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 700px;
            background-color: #000;
            border-radius: 10px;
            overflow: hidden;
            max-height: 90vh;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            color: #fff;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            width: 40px;
            height: 40px;
            text-align: center;
            line-height: 40px;
            border-radius: 50%;
        }

        .close-btn:hover {
            color: #ccc;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            background: #000;
            min-height: 300px;
        }

        /* ===================================== */
        /* === RESPONSIVE DESIGN (PHONE MODE) === */
        /* ===================================== */

        @media (max-width: 1024px) {
            
            /* --- CENTER EVERYTHING --- */
            body {
                padding-left: 80px !important; /* Make space for left chars */
                padding-right: 80px !important; /* Make space for right chars */
            }

            /* --- MAKE CHARACTERS SMALLER BUT STAY IN PLACE --- */
            .character-wrapper {
                width: 60px !important;
                height: 45px !important;
            }
            
            .left {
                left: 10px !important; /* Stay on left edge */
                gap: 20px !important;
            }

            .right {
                right: 10px !important; /* Stay on right edge */
                gap: 20px !important;
            }

            /* --- MAKE TEXT INSIDE CHARACTERS SMALLER ON PHONE --- */
            .name-text {
                font-size: 8px !important; /* VERY SMALL TEXT */
                letter-spacing: 0.5px !important;
            }

            /* --- MAKE TITLE AND PHOTOS FIT NICELY --- */
            .title {
                font-size: 1.8rem;
                text-align: center;
            }
            
            .gallery-container {
                max-width: 100% !important;
                width: 100% !important;
            }
        }

        @media (max-width: 600px) {
            .title {
                font-size: 1.5rem;
                letter-spacing: 1px;
            }
            
            .gallery-container {
                gap: 5px;
            }
            
            body {
                background-size: 80%;
            }
        }

    </style>
</head>
